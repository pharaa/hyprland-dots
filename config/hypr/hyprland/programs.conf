# проги

$nvtop = kitty nvtop
$htop = kitty htop
$terminal = alacritty
$fileManager = kitty ranger
$menu = fuzzel
$browser = chromium
$launcher = prismlauncher

# некоторые функции

# !!!ПОМЕНЯТЬ power-button НА НАЗВАНИЕ ВАШЕЙ КЛАВИАТУРЫ В hyprctl devices!!!
$rskb = hyprctl switchxkblayout power-button 0
$screenshot = bash /home/$USER/.config/fuzzel/screenshot.sh
$pick = hyprpicker -a
$wipe = cliphist wipe

$clipboard = cliphist list | fuzzel --dmenu | cliphist decode | wl-copy