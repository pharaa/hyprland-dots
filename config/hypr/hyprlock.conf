# фон
background {
    monitor =
    path = /your/path/
    blur_size = 4
    blur_passes = 3
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# часы
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H"):$(date +"%M") </big></b>"
    color = $color6
    font_size = 112
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 3
    shadow_size = 4

    position = 700, 50
    halign = center
    valign = bottom
}

# день недели
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = $color7
    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 850, 250
    halign = center
    valign = bottom
}

# число / месяц
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = $color7
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 870, 290
    halign = center
    valign = bottom
}

# аватарка
image {
    monitor =
    path = /home/$USER/.avatar
}

# юз
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$USER" </b>"
    color = $color7
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, 420
    halign = center
    valign = bottom
}

# поле ввода пароля
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3

    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rouding = -1

    rounding = 22
    outer_color = $color0
    inner_color = $color0
    font_color = $color6
    fade_on_empty = true
    placeholder_text = <i>Password...</i>

    position = 0, 300
    halign = center
    valign = bottom
}
