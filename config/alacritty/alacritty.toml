[font]
size = 12

[font.normal]
family = "JetBrainsMono NFM"

[[keyboard.bindings]]
chars = "\u001Bb"
key = "Left"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bf"
key = "Right"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001B\u007F"
key = "Back"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u0015"
key = "Back"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001BOH"
key = "Left"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001BOF"
key = "Right"
mods = "Command"

[[keyboard.bindings]]
chars = '\1'
key = "Key1"
mods = "Command"

[[keyboard.bindings]]
chars = '\2'
key = "Key2"
mods = "Command"

[[keyboard.bindings]]
chars = '\3'
key = "Key3"
mods = "Command"

[[keyboard.bindings]]
chars = '\4'
key = "Key4"
mods = "Command"

[[keyboard.bindings]]
chars = '\5'
key = "Key5"
mods = "Command"

[[keyboard.bindings]]
chars = '\6'
key = "Key6"
mods = "Command"

[[keyboard.bindings]]
chars = '\7'
key = "Key7"
mods = "Command"

[[keyboard.bindings]]
chars = '\8'
key = "Key8"
mods = "Command"

[[keyboard.bindings]]
chars = '\9'
key = "Key9"
mods = "Command"

[[keyboard.bindings]]
chars = '\x'
key = "W"
mods = "Command"

[[keyboard.bindings]]
chars = '\c'
key = "T"
mods = "Command"

[scrolling]
history = 10000

[window]
decorations = "none"
opacity = 0.75
startup_mode = "Maximized"

[window.dimensions]
columns = 120
lines = 90

[window.padding]
x = 20
y = 20

[colors]
draw_bold_text_with_bright_colors = false

[colors.primary]
background = '#1e1e2e'
foreground = '#abb2bf'

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[colors.dim]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[keyboard]
